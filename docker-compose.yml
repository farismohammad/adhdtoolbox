services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TTS_API_URL: ${VITE_TTS_API_URL:-/api}
    depends_on:
      - tts
    ports:
      - "3000:3000"

  tts:
    build:
      context: .
      dockerfile: services/tts/Dockerfile
    environment:
      TTS_MODEL_DIR: ${TTS_MODEL_DIR:-/models}
      TTS_OUTPUT_DIR: ${TTS_OUTPUT_DIR:-/tmp/generated_audio}
      TTS_PROMPT_AUDIO_PATH: ${TTS_PROMPT_AUDIO_PATH:-/srv/voice.wav}
      TTS_EXECUTION_PROVIDER: ${TTS_EXECUTION_PROVIDER:-cpu}
      TTS_CPU_THREADS: ${TTS_CPU_THREADS:-4}
      TTS_TIMEOUT_SECONDS: ${TTS_TIMEOUT_SECONDS:-120}
      TTS_HOST: 0.0.0.0
      TTS_PORT: 8000
    expose:
      - "8000"
    volumes:
      - /data/adhdtoolbox/tts-models:/models

